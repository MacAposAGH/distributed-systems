syntax = "proto3";
import "google/protobuf/timestamp.proto";

package tutorial;

option java_package = "sr.serialization.proto";
option java_outer_classname = "ForecastProto";

message Weather {
  google.protobuf.Timestamp date = 1;
  double temperature = 3;
  double wind = 4;
  double chanceOfPrecipitation = 5;
  double cloudy = 6;
}

message Forecast {
  string city = 1;
  repeated Weather forecast = 2;
}