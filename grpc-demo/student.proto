syntax = "proto3";
import "google/protobuf/empty.proto";
import "google/protobuf/wrappers.proto";

option java_multiple_files = true;
option java_package = "sr.grpc.gen";
option java_outer_classname = "StudentProto";

package student;

enum SubjectName {
  BIOLOGY = 0;
  ENGLISH = 1;
  GEOGRAPHY = 2;
  MATH = 3;
}

message Student {
  string name = 1;
}

message Subject {
  SubjectName subjectName = 1;
}

message Grade {
  double grade = 1;
  Student student = 2;
  SubjectName subjectName = 3;
}

message Grades {
  repeated Grade grades = 1;
}

message StudentGpa {
  Student student = 1;
  google.protobuf.DoubleValue gpa = 2;
}

service GradeBook {
  rpc getStudentGrades (Student) returns (Grades) {}
  rpc getStudentBestSubject (Student) returns (Grade) {}
  rpc getStudentGpa (Student) returns (google.protobuf.DoubleValue) {}
  rpc getSubjectBestStudent (Subject) returns (Grade) {}
  rpc getBestGpa(google.protobuf.Empty) returns (StudentGpa);
}
