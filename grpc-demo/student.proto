syntax = "proto3";

option java_multiple_files = true;
option java_package = "sr.grpc.gen";
option java_outer_classname = "StudentProto";

package student;

enum SubjectName {
  BIOLOGY = 0;
  ENGLISH = 1;
  GEOGRAPHY = 2;
  MATH = 3;
}

message Student {
  string name = 1;
}

message StudentNameOpArguments {
  string name = 1;
}

message Grade {
  double grade = 1;
  Student student = 2;
  SubjectName subject = 3;
}


message GradesOpResult {
  repeated Grade grades = 1;
}

service GradeBook {
  rpc getAllGradesByStudentName (StudentNameOpArguments) returns (GradesOpResult) {}
}
